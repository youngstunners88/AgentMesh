# AgentMesh Docker Compose - Local Development
version: '3.8'

services:
  agentmesh:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/data/agentmesh.db
    volumes:
      - ./data:/data
    depends_on:
      - redis
    networks:
      - agentmesh-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - agentmesh-network

  dashboard:
    build: ./web-ui
    ports:
      - "8080:80"
    depends_on:
      - agentmesh
    networks:
      - agentmesh-network

volumes:
  redis-data:

networks:
  agentmesh-network:
    driver: bridge