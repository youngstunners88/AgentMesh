# AgentMesh Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentmesh
  namespace: agentmesh
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agentmesh
  template:
    metadata:
      labels:
        app: agentmesh
    spec:
      containers:
      - name: agentmesh
        image: agentmesh:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agentmesh-service
  namespace: agentmesh
spec:
  selector:
    app: agentmesh
  ports:
  - port: 80
    targetPort: 3000
  type: LoadBalancer